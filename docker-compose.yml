version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: flock_postgres
    environment:
      POSTGRES_USER: flock_user
      POSTGRES_PASSWORD: flock_password
      POSTGRES_DB: flock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: flock_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: