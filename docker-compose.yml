version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: flock_postgres
    environment:
      POSTGRES_USER: flock_user
      POSTGRES_PASSWORD: flock_password
      POSTGRES_DB: flock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: flock_redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: flock_meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  meilisearch_data: